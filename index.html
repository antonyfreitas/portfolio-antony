<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antony Freitas | Tactical Systems Analyst</title>
    <style>
        :root {
            /* Paleta Cyber-Tech Vermelha */
            --bg-base: #08090b;
            --bg-panel: rgba(20, 22, 27, 0.85);
            --accent-primary: #ff2d2d; /* Vermelho vibrante */
            --accent-glow: rgba(255, 45, 45, 0.4);
            --text-main: #e0e6ed;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 45, 45, 0.15);
            --glass-morph: blur(10px) saturate(180%);
        }

        @keyframes fadeInSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes backgroundPulse {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Segoe UI Mono', monospace;
            background: linear-gradient(-45deg, #08090b, #121418, #050506, #101114);
            background-size: 400% 400%;
            animation: backgroundPulse 15s ease infinite;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Container Principal */
        .main-container {
            max-width: 900px;
            width: 100%;
            animation: fadeInSlideUp 0.8s ease-out;
        }

        /* Header Estilo Terminal de Comando */
        header {
            text-align: center;
            padding: 40px;
            background: var(--bg-panel);
            backdrop-filter: var(--glass-morph);
            -webkit-backdrop-filter: var(--glass-morph);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
        }

        h1 {
            color: var(--text-main);
            margin: 0;
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
        }

        h1 span {
            color: var(--accent-primary);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin: 10px 0 25px 0;
        }

        .profile-summary {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 4px;
            border-left: 3px solid var(--accent-primary);
            text-align: left;
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 25px;
        }

        /* Botões de Contato Modernos */
        .contact-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 4px;
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-action:hover {
            background: var(--accent-primary);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.05);
        }

        h2 {
            font-size: 1.5rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 50px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            animation: fadeInSlideUp 1s ease-out both;
            animation-delay: 0.2s;
        }

        h2::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: var(--border-color);
            margin-left: 20px;
        }

        /* Seções de Cartões com Animação */
        .content-section {
            display: grid;
            gap: 25px;
            animation: fadeInSlideUp 1s ease-out both;
            animation-delay: 0.4s;
        }

        .data-card {
            background: var(--bg-panel);
            backdrop-filter: var(--glass-morph);
            -webkit-backdrop-filter: var(--glass-morph);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .data-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 30px -10px rgba(255, 45, 45, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 10px;
        }

        .card-title {
            color: var(--text-main);
            font-weight: bold;
            font-size: 1.25rem;
        }

        .card-title span {
            color: var(--accent-primary);
        }

        .card-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
            white-space: nowrap;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .card-body {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Habilidades como Módulos de Energia */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            animation: fadeInSlideUp 1s ease-out both;
            animation-delay: 0.3s;
        }

        .skill-module {
            padding: 10px 18px;
            background: rgba(20, 22, 27, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: default;
        }

        .skill-module:hover {
            background: rgba(255, 45, 45, 0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(255, 45, 45, 0.2);
            transform: translateY(-3px);
        }

    </style>
</head>
<body>

    <div class="main-container">
        
        <header>
            <h1>Antony <span>Freitas</span></h1>
            <div class="subtitle">Tactical Systems Analyst | Data & Infrastructure</div>
            
            <div class="profile-summary">
                &gt; INICIANDO PERFIL...<br>
                &gt; Profissional de TI Estratégica, 25 anos.<br>
                &gt; Especialidade: Otimização de Processos (Python), Análise de Dados e Infraestrutura de TI.<br>
                &gt; Foco: Transformar dados brutos em insights operacionais acionáveis.
            </div>

            <div class="contact-bar">
                <a href="mailto:antony.freitas@outlook.com.br" class="btn-action">Email
